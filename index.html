<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>blackhole</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
  }

  :root {
    --void: #000000;
    --event-horizon: #0a0a0f;
    --accretion: #1a0a2e;
    --corona: #2d1b69;
    --glow-idle: rgba(80, 40, 180, 0.15);
    --glow-hover: rgba(100, 50, 220, 0.4);
    --glow-active: rgba(140, 80, 255, 0.6);
    --glow-error: rgba(220, 30, 30, 0.5);
    --glow-success: rgba(40, 200, 120, 0.4);
    --text: rgba(255, 255, 255, 0.12);
    --text-status: rgba(255, 255, 255, 0.22);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--void);
    overflow: hidden;
    font-family: 'Space Mono', 'Courier New', monospace;
    cursor: crosshair;
  }

  /* Star field */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.06) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.04) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 8%, rgba(255,255,255,0.05) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 22%, rgba(255,255,255,0.03) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 55%, rgba(255,255,255,0.06) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 12%, rgba(255,255,255,0.04) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 70%, rgba(255,255,255,0.05) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 80%, rgba(255,255,255,0.03) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 75%, rgba(255,255,255,0.04) 0%, transparent 100%),
      radial-gradient(1px 1px at 33% 90%, rgba(255,255,255,0.05) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 5% 50%, rgba(255,255,255,0.08) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 80% 35%, rgba(255,255,255,0.07) 0%, transparent 100%),
      radial-gradient(2px 2px at 55% 62%, rgba(255,255,255,0.05) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Subtle deep space radial gradient */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 50%,
      rgba(15, 5, 35, 0.6) 0%,
      transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wordmark {
    position: fixed;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.45em;
    color: var(--text);
    text-transform: lowercase;
    z-index: 10;
    user-select: none;
  }

  .hint {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.06);
    text-transform: lowercase;
    z-index: 10;
    user-select: none;
    white-space: nowrap;
  }

  /* ─── SCENE ─────────────────────────────────────────────────── */
  .scene {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  /* ─── OUTER ACCRETION DISK ─────────────────────────────────── */
  .accretion-disk {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      transparent 0%,
      rgba(45, 27, 105, 0.03) 15%,
      rgba(80, 40, 160, 0.06) 30%,
      rgba(45, 27, 105, 0.03) 45%,
      transparent 60%,
      rgba(30, 15, 80, 0.04) 75%,
      rgba(45, 27, 105, 0.02) 90%,
      transparent 100%
    );
    animation: diskSpin 28s linear infinite;
    pointer-events: none;
  }

  .accretion-disk-2 {
    position: absolute;
    width: 420px;
    height: 420px;
    border-radius: 50%;
    background: conic-gradient(
      from 180deg,
      transparent 0%,
      rgba(60, 20, 140, 0.05) 20%,
      rgba(100, 50, 200, 0.08) 40%,
      rgba(60, 20, 140, 0.04) 60%,
      transparent 80%,
      transparent 100%
    );
    animation: diskSpin 18s linear infinite reverse;
    pointer-events: none;
  }

  @keyframes diskSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ─── GRAVITATIONAL LENSING RING ───────────────────────────── */
  .lens-ring {
    position: absolute;
    width: 360px;
    height: 360px;
    border-radius: 50%;
    border: 1px solid rgba(80, 40, 180, 0.06);
    box-shadow:
      0 0 40px rgba(80, 40, 180, 0.04),
      inset 0 0 40px rgba(0,0,0,0.8);
    animation: lensPulse 6s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes lensPulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50%       { opacity: 0.7; transform: scale(1.005); }
  }

  /* ─── THE BLACK HOLE ───────────────────────────────────────── */
  .hole-wrapper {
    position: relative;
    width: 300px;
    height: 300px;
    cursor: pointer;
  }

  .hole {
    position: relative;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 38% 35%,
        rgba(25, 10, 60, 0.9) 0%,
        rgba(8, 3, 20, 0.97) 40%,
        #000 65%
      );
    box-shadow:
      0 0 0 1px rgba(80, 40, 180, 0.12),
      0 0 30px rgba(80, 40, 180, 0.1),
      0 0 80px rgba(60, 20, 140, 0.08),
      0 8px 40px rgba(0, 0, 0, 0.9),
      0 20px 60px rgba(0, 0, 0, 0.6),
      inset 0 2px 4px rgba(120, 80, 255, 0.06),
      inset 0 0 60px rgba(0, 0, 0, 1);
    transform: translateY(-4px);
    transition:
      transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
      box-shadow 0.4s ease;
    overflow: hidden;
  }

  /* Inner vortex layers */
  .hole::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      transparent 0%,
      rgba(40, 15, 100, 0.12) 10%,
      transparent 20%,
      rgba(30, 10, 80, 0.08) 35%,
      transparent 50%,
      rgba(40, 15, 100, 0.1) 65%,
      transparent 80%,
      rgba(30, 10, 80, 0.06) 90%,
      transparent 100%
    );
    animation: vortex 8s linear infinite;
  }

  .hole::after {
    content: '';
    position: absolute;
    inset: 15%;
    border-radius: 50%;
    background: conic-gradient(
      from 180deg,
      transparent 0%,
      rgba(60, 20, 140, 0.15) 15%,
      transparent 30%,
      rgba(50, 15, 120, 0.1) 50%,
      transparent 70%,
      rgba(60, 20, 140, 0.12) 85%,
      transparent 100%
    );
    animation: vortex 5s linear infinite reverse;
  }

  @keyframes vortex {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* Deep center singularity */
  .singularity {
    position: absolute;
    inset: 30%;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(15, 5, 40, 0.6) 0%,
      transparent 70%
    );
    animation: singularityPulse 4s ease-in-out infinite;
  }

  @keyframes singularityPulse {
    0%, 100% { opacity: 0.4; transform: scale(0.95); }
    50%       { opacity: 0.8; transform: scale(1.05); }
  }

  /* ─── HOVER STATE ───────────────────────────────────────────── */
  .hole-wrapper:hover .hole {
    transform: translateY(-7px) scale(1.025);
    box-shadow:
      0 0 0 1px rgba(100, 55, 220, 0.2),
      0 0 50px rgba(100, 55, 220, 0.2),
      0 0 120px rgba(80, 30, 180, 0.12),
      0 14px 60px rgba(0, 0, 0, 0.95),
      0 25px 80px rgba(0, 0, 0, 0.7),
      inset 0 2px 4px rgba(140, 90, 255, 0.1),
      inset 0 0 60px rgba(0, 0, 0, 1);
  }

  .hole-wrapper:hover .hole::before { animation-duration: 5s; }
  .hole-wrapper:hover .hole::after  { animation-duration: 3s; }

  /* ─── SPINNER RINGS ─────────────────────────────────────────── */
  .spinner-ring {
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 1.5px solid transparent;
    border-top-color: rgba(120, 70, 255, 0.7);
    border-right-color: rgba(100, 50, 220, 0.3);
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  .spinner-ring-2 {
    position: absolute;
    inset: -22px;
    border-radius: 50%;
    border: 1px solid transparent;
    border-bottom-color: rgba(80, 40, 180, 0.4);
    border-left-color: rgba(80, 40, 180, 0.15);
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  @keyframes spinFwd { to { transform: rotate(360deg); } }
  @keyframes spinRev { to { transform: rotate(-360deg); } }

  /* ─── STATE: LOADING ─────────────────────────────────────────── */
  .hole-wrapper.loading .hole {
    transform: translateY(-4px) scale(0.96);
    box-shadow:
      0 0 0 1px rgba(100, 55, 220, 0.15),
      0 0 60px rgba(100, 55, 220, 0.25),
      0 6px 30px rgba(0, 0, 0, 0.9),
      inset 0 0 60px rgba(0, 0, 0, 1);
    transition: transform 0.25s cubic-bezier(0.36, 0.07, 0.19, 0.97),
                box-shadow 0.3s ease;
  }
  .hole-wrapper.loading .hole::before { animation-duration: 2s; }
  .hole-wrapper.loading .hole::after  { animation-duration: 1.2s; }
  .hole-wrapper.loading .spinner-ring {
    opacity: 1;
    animation: spinFwd 1.2s linear infinite;
  }
  .hole-wrapper.loading .spinner-ring-2 {
    opacity: 1;
    animation: spinRev 2s linear infinite;
  }

  /* ─── STATE: SUCCESS ─────────────────────────────────────────── */
  .hole-wrapper.success .hole {
    transform: translateY(-4px);
    box-shadow:
      0 0 0 1px rgba(40, 200, 120, 0.2),
      0 0 60px rgba(40, 200, 120, 0.15),
      0 0 120px rgba(20, 160, 80, 0.08),
      0 10px 50px rgba(0, 0, 0, 0.9),
      inset 0 0 60px rgba(0, 0, 0, 1);
  }
  .hole-wrapper.success .spinner-ring {
    border-top-color: rgba(40, 200, 120, 0.7);
    border-right-color: rgba(40, 200, 120, 0.3);
    opacity: 1;
    animation: spinFwd 2.5s linear infinite;
  }

  /* ─── STATE: ERROR ───────────────────────────────────────────── */
  .hole-wrapper.error .hole {
    transform: translateY(-4px);
    animation: errorPulse 1.5s ease-out forwards;
  }

  @keyframes errorPulse {
    0%   { box-shadow: 0 0 0 1px rgba(220,30,30,0.5), 0 0 80px rgba(220,30,30,0.4), 0 10px 50px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,1); }
    50%  { box-shadow: 0 0 0 2px rgba(220,30,30,0.7), 0 0 120px rgba(220,30,30,0.5), 0 10px 50px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,1); }
    100% { box-shadow: 0 0 0 1px rgba(80,40,180,0.12), 0 0 30px rgba(80,40,180,0.1), 0 8px 40px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,1); }
  }

  /* ─── RIPPLE ─────────────────────────────────────────────────── */
  .ripple {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(40, 200, 120, 0.5);
    animation: rippleOut 1s ease-out forwards;
    pointer-events: none;
  }
  .ripple:nth-child(2) { animation-delay: 0.2s; }

  @keyframes rippleOut {
    from { transform: scale(1); opacity: 0.8; }
    to   { transform: scale(2.4); opacity: 0; }
  }

  /* ─── STATUS TEXT ───────────────────────────────────────────── */
  .status {
    margin-top: 44px;
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--text-status);
    text-transform: lowercase;
    text-align: center;
    transition: color 0.5s ease;
    min-height: 16px;
    user-select: none;
  }
  .status.error-text   { color: rgba(220, 80, 80, 0.5); }
  .status.success-text { color: rgba(40, 200, 120, 0.4); }

  /* ─── CUSTOM CURSOR ─────────────────────────────────────────── */
  .cursor {
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(100, 55, 220, 0.5);
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.15s ease, background 0.2s ease;
    mix-blend-mode: screen;
  }
</style>
</head>
<body>

<div class="wordmark">blackhole</div>

<div class="scene">
  <div class="accretion-disk"></div>
  <div class="accretion-disk-2"></div>
  <div class="lens-ring"></div>

  <div class="hole-wrapper" id="holeWrapper">
    <div class="hole">
      <div class="singularity"></div>
    </div>
    <div class="spinner-ring"></div>
    <div class="spinner-ring-2"></div>
  </div>

  <div class="status" id="status">copy a url · then click</div>
</div>

<div class="hint">youtube · instagram · twitter · tiktok · and more</div>
<div class="cursor" id="cursor"></div>

<script>
  // Custom cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
  });

  const wrapper = document.getElementById('holeWrapper');
  const status  = document.getElementById('status');
  let busy = false;

  function setState(state, msg, msgClass) {
    wrapper.className = 'hole-wrapper' + (state ? ' ' + state : '');
    status.className  = 'status' + (msgClass ? ' ' + msgClass : '');
    status.textContent = msg;
  }

  function triggerDownload(url, filename) {
    const a = document.createElement('a');
    a.href = url;
    if (filename) a.download = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => a.remove(), 3000);
  }

  function spawnRipples() {
    for (let i = 0; i < 2; i++) {
      const r = document.createElement('div');
      r.className = 'ripple';
      wrapper.appendChild(r);
      setTimeout(() => r.remove(), 1200);
    }
  }

  function resetAfter(ms) {
    setTimeout(() => {
      if (!busy) setState('', 'copy a url · then click');
    }, ms);
  }

  async function consume() {
    if (busy) return;

    // Read clipboard
    let url;
    try {
      url = (await navigator.clipboard.readText()).trim();
    } catch {
      setState('error', 'clipboard access denied', 'error-text');
      resetAfter(3000);
      return;
    }

    if (!url || !/^https?:\/\//i.test(url)) {
      setState('error', 'no valid url in clipboard', 'error-text');
      resetAfter(3000);
      return;
    }

    busy = true;
    setState('loading', 'consuming…');

    // Call cobalt API
    let data;
    try {
      const res = await fetch('https://api.cobalt.tools/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify({ url, downloadMode: 'auto' })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      data = await res.json();
    } catch (err) {
      setState('error', 'could not reach cobalt api', 'error-text');
      resetAfter(3500);
      busy = false;
      return;
    }

    const s = data.status;

    if (s === 'tunnel' || s === 'redirect') {
      triggerDownload(data.url, data.filename);
      setState('success', 'devoured', 'success-text');
      spawnRipples();
      resetAfter(4000);

    } else if (s === 'picker' && Array.isArray(data.picker) && data.picker.length) {
      data.picker.forEach((item, i) => {
        setTimeout(() => triggerDownload(item.url, item.filename), i * 700);
      });
      setState('success', `devoured · ${data.picker.length} file${data.picker.length > 1 ? 's' : ''}`, 'success-text');
      spawnRipples();
      resetAfter(4500);

    } else {
      const msg = data.error?.code
        ? data.error.code.replace(/_/g, ' ').toLowerCase()
        : (typeof data.text === 'string' ? data.text : 'unsupported or private url');
      setState('error', msg, 'error-text');
      resetAfter(3500);
    }

    busy = false;
  }

  wrapper.addEventListener('click', consume);

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      consume();
    }
  });
</script>
</body>
</html>
