<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>blackhole</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }

  .wordmark {
    position: fixed;
    top: 26px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: .55em;
    color: rgba(255,255,255,.08);
    text-transform: lowercase;
    user-select: none;
    z-index: 10;
  }

  .hint {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: .28em;
    color: rgba(255,255,255,.05);
    text-transform: lowercase;
    user-select: none;
    white-space: nowrap;
    z-index: 10;
  }

  /* ambient glow behind circle */
  .glow {
    position: absolute;
    width: 420px; height: 420px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(55, 15, 130, .1) 0%,
      transparent 68%);
    animation: breathe 6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes breathe {
    0%,100% { transform: scale(1);    opacity: .7; }
    50%      { transform: scale(1.08); opacity: 1;  }
  }

  .scene {
    position: fixed; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 38px;
  }

  /* ── circle ── */
  .hole-wrapper {
    position: relative;
    width: 260px; height: 260px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .hole {
    width: 260px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle at 42% 38%,
      rgba(50, 18, 105, .5)  0%,
      rgba(8,   3,  22, .95) 38%,
      #000                   64%
    );
    box-shadow:
      0 0 0 1px rgba(65, 25, 150, .13),
      0 0 50px  rgba(50, 15, 120, .11),
      0 14px 48px rgba(0, 0, 0, .88),
      0 30px 72px rgba(0, 0, 0, .52);
    transform: translateY(-5px);
    transition: transform .45s cubic-bezier(.34,1.56,.64,1),
                box-shadow  .45s ease;
    position: relative;
    overflow: hidden;
  }

  /* single slow inner sheen */
  .hole::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      transparent         0%,
      rgba(50,15,120,.08) 20%,
      transparent         38%,
      rgba(38,10, 95,.05) 62%,
      transparent         80%
    );
    animation: sheen 16s linear infinite;
  }
  @keyframes sheen { to { transform: rotate(360deg); } }

  /* hover */
  .hole-wrapper:hover .hole {
    transform: translateY(-9px) scale(1.03);
    box-shadow:
      0 0 0 1px rgba(85, 35, 200, .2),
      0 0 65px  rgba(70, 25, 170, .2),
      0 0 130px rgba(55, 15, 145, .09),
      0 18px 58px rgba(0, 0, 0, .90),
      0 34px 82px rgba(0, 0, 0, .58);
  }

  /* spinner rings */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid transparent;
    opacity: 0;
    transition: opacity .3s ease;
    pointer-events: none;
  }
  .r1 { inset: -14px; border-top-color: rgba(105,55,245,.6); border-right-color: rgba(85,38,210,.2); }
  .r2 { inset: -26px; border: 1px solid transparent; border-bottom-color: rgba(70,28,180,.35); border-left-color: rgba(70,28,180,.1); }

  @keyframes cw  { to { transform: rotate( 360deg); } }
  @keyframes ccw { to { transform: rotate(-360deg); } }

  /* ── states ── */
  .hole-wrapper.loading .hole {
    transform: translateY(-5px) scale(.96);
    transition: transform .2s cubic-bezier(.36,.07,.19,.97), box-shadow .3s;
    box-shadow: 0 0 0 1px rgba(85,35,200,.15), 0 0 65px rgba(85,35,200,.2), 0 8px 32px rgba(0,0,0,.85);
  }
  .hole-wrapper.loading .hole::before { animation-duration: 4s; }
  .hole-wrapper.loading .r1 { opacity:1; animation: cw  1.1s linear infinite; }
  .hole-wrapper.loading .r2 { opacity:1; animation: ccw 1.9s linear infinite; }

  .hole-wrapper.success .hole {
    transform: translateY(-5px);
    box-shadow: 0 0 0 1px rgba(38,195,105,.16), 0 0 58px rgba(38,190,100,.13), 0 14px 48px rgba(0,0,0,.85);
  }
  .hole-wrapper.success .r1 {
    opacity:1;
    border-top-color: rgba(38,195,105,.52); border-right-color: rgba(38,195,105,.15);
    animation: cw 2.4s linear infinite;
  }

  .hole-wrapper.error .hole {
    transform: translateY(-5px);
    animation: errFlash 1.4s ease-out forwards;
  }
  @keyframes errFlash {
    0%   { box-shadow: 0 0 0 1px rgba(205,28,28,.5),  0 0  80px rgba(205,28,28,.36), 0 14px 48px rgba(0,0,0,.85); }
    50%  { box-shadow: 0 0 0 2px rgba(205,28,28,.68), 0 0 110px rgba(205,28,28,.46), 0 14px 48px rgba(0,0,0,.85); }
    100% { box-shadow: 0 0 0 1px rgba(65,25,150,.13),  0 0  50px rgba(50,15,120,.11), 0 14px 48px rgba(0,0,0,.88); }
  }

  /* ripple */
  .ripple {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(38,195,105,.42);
    animation: rpl 1s ease-out forwards;
    pointer-events: none;
  }
  .ripple.d { animation-delay: .2s; }
  @keyframes rpl {
    from { transform: scale(1);   opacity: .7; }
    to   { transform: scale(2.6); opacity: 0;  }
  }

  /* status */
  .status {
    font-size: 9.5px;
    letter-spacing: .34em;
    color: rgba(255,255,255,.16);
    text-transform: lowercase;
    text-align: center;
    transition: color .4s ease;
    min-height: 14px;
    user-select: none;
  }
  .status.err { color: rgba(215,65,65,.42); }
  .status.ok  { color: rgba(38,190,100,.36); }
</style>
</head>
<body>

<div class="wordmark">blackhole</div>

<div class="scene">
  <div class="glow"></div>
  <div class="hole-wrapper" id="hw">
    <div class="hole"></div>
    <div class="ring r1"></div>
    <div class="ring r2"></div>
  </div>
  <div class="status" id="st">copy a url · then click</div>
</div>

<div class="hint">youtube · instagram · tiktok · twitter · vimeo · and more</div>

<script>
// ── Invidious instances (fallback chain) ───────────────────────
const INVIDIOUS = [
  'https://yewtu.be',
  'https://inv.tux.pizza',
  'https://invidious.kavin.rocks',
  'https://iv.ggtyler.dev',
  'https://invidious.slipfox.xyz',
];

// ── CORS proxies (fallback chain) ──────────────────────────────
const PROXY = [
  u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
];

// ── helpers ────────────────────────────────────────────────────
const hw = document.getElementById('hw');
const st = document.getElementById('st');
let busy = false;

function set(state, msg, cls) {
  hw.className = 'hole-wrapper' + (state ? ' ' + state : '');
  st.className  = 'status'       + (cls   ? ' ' + cls   : '');
  st.textContent = msg;
}
function reset(ms) {
  setTimeout(() => { if (!busy) set('', 'copy a url · then click'); }, ms);
}
function ripple() {
  ['', 'd'].forEach(k => {
    const r = document.createElement('div');
    r.className = 'ripple' + (k ? ' ' + k : '');
    hw.appendChild(r);
    setTimeout(() => r.remove(), 1300);
  });
}
function download(url, name) {
  const a = document.createElement('a');
  a.href = url; a.download = name || 'video';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => a.remove(), 4000);
}

// ── YouTube ID extraction ──────────────────────────────────────
function ytId(url) {
  const m = url.match(
    /(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/
  );
  return m ? m[1] : null;
}

// ── YouTube via Invidious API ──────────────────────────────────
async function downloadYT(id) {
  for (const base of INVIDIOUS) {
    try {
      const r = await fetch(
        `${base}/api/v1/videos/${id}?fields=title,formatStreams`,
        { headers: { Accept: 'application/json' } }
      );
      if (!r.ok) continue;
      const d = await r.json();
      // formatStreams = muxed video+audio mp4, sorted best first
      const streams = (d.formatStreams || [])
        .filter(f => f.container === 'mp4' || (f.type || '').includes('mp4'))
        .sort((a, b) => (parseInt(b.resolution) || 0) - (parseInt(a.resolution) || 0));
      if (streams.length) {
        return { url: streams[0].url, name: (d.title || 'video').replace(/[/\\?%*:|"<>]/g,'_') + '.mp4' };
      }
    } catch { /* try next */ }
  }
  throw new Error('youtube: all invidious instances failed');
}

// ── Generic video extraction via CORS proxy ────────────────────
async function fetchHTML(pageUrl) {
  for (const proxy of PROXY) {
    try {
      const r   = await fetch(proxy(pageUrl));
      const raw = await r.json().catch(() => null) || await r.text().catch(() => null);
      if (!raw) continue;
      // allorigins returns { contents: '...' }, corsproxy returns raw text
      return typeof raw === 'object' ? (raw.contents || '') : raw;
    } catch { /* try next */ }
  }
  throw new Error('could not fetch page');
}

function extractVideoUrl(html, pageUrl) {
  const patterns = [
    // og:video:secure_url / og:video
    /property="og:video(?::secure_url|:url)?"[^>]+content="([^"]+\.(?:mp4|webm|m3u8)[^"]*)"/i,
    /content="([^"]+\.(?:mp4|webm|m3u8)[^"]*)"[^>]+property="og:video/i,
    // <video src=
    /<video[^>]+src="([^"]+\.(?:mp4|webm)[^"]*)"/i,
    // <source src=
    /<source[^>]+src="([^"]+\.(?:mp4|webm|m3u8)[^"]*)"/i,
    // twitter player stream
    /"playbackUrl"\s*:\s*"([^"]+\.(?:mp4|m3u8)[^"]*)"/i,
    // instagram video_url
    /"video_url"\s*:\s*"([^"]+\.mp4[^"]*)"/i,
    // generic "videoUrl" json key
    /"(?:videoUrl|video_url|contentUrl|hlsUrl)"\s*:\s*"([^"]+)"/i,
  ];
  for (const re of patterns) {
    const m = html.match(re);
    if (m && m[1]) return m[1].replace(/\\u0026/g,'&').replace(/\\/g,'');
  }
  return null;
}

async function downloadGeneric(pageUrl) {
  const html    = await fetchHTML(pageUrl);
  const vidUrl  = extractVideoUrl(html, pageUrl);
  if (!vidUrl) throw new Error('no video found on this page');

  // derive filename from url path
  const seg  = vidUrl.split('/').pop().split('?')[0];
  const name = seg.includes('.') ? seg : 'video.mp4';
  return { url: vidUrl, name };
}

// ── main ───────────────────────────────────────────────────────
async function consume() {
  if (busy) return;

  let url;
  try { url = (await navigator.clipboard.readText()).trim(); }
  catch {
    set('error', 'clipboard access denied', 'err');
    reset(3000); return;
  }

  if (!url || !/^https?:\/\//i.test(url)) {
    set('error', 'no valid url in clipboard', 'err');
    reset(3000); return;
  }

  busy = true;
  set('loading', 'consuming…');

  try {
    let result;
    const id = ytId(url);
    if (id) {
      result = await downloadYT(id);
    } else {
      result = await downloadGeneric(url);
    }
    download(result.url, result.name);
    set('success', 'devoured', 'ok');
    ripple();
    reset(4500);
  } catch (e) {
    set('error', e.message.slice(0, 48), 'err');
    reset(4000);
  }

  busy = false;
}

hw.addEventListener('click', consume);
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); consume(); }
});
</script>
</body>
</html>
